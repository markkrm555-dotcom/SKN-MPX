
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<style>
body {
    font-family: Arial;
    background: #f7fbff;
    color: black;
    text-align: center;
    padding: 30px;
}

table {
    border-collapse: collapse;
    width: 70%;
    margin: auto;
    background: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
}

th {
    background: #eef5fb;
}

tr:nth-child(even) {
    background: #f4f7fa;
}

.gold { background-color: #FFD700; font-weight: bold; }
.silver { background-color: #C0C0C0; font-weight: bold; }
.bronze { background-color: #CD7F32; font-weight: bold; }

.stats {
    margin-top: 40px;
}
</style>
</head>

<body>

<h1>🏆 Leaderboard </h1>

<table>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Accuracy</th>
<th>F1-score</th>
</tr>

    <tr class="gold">
        <td>🥇 1</td>
        <td>AlyaaGibreel</td>
        <td>99.33</td>
        <td>99.3000</td>
    </tr>
    
    <tr class="silver">
        <td>🥈 2</td>
        <td>Fares2004-full</td>
        <td>86.16</td>
        <td>84.3100</td>
    </tr>
    
</table>

<div class="stats">

</body>
</html>
